<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- ─── SEO ─── -->
    <title>Mall of America — Partner With America's Destination</title>
    <meta name="description" content="America's largest retail, dining, and entertainment destination. Unlock unmatched reach for your brand. Open a store, sponsor an experience, or host an event at Mall of America." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://moa-deck.vercel.app/" />

    <!-- ─── Open Graph ─── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://moa-deck.vercel.app/" />
    <meta property="og:title" content="Mall of America — Partner With America's Destination" />
    <meta property="og:description" content="America's largest retail, dining, and entertainment destination. 40M+ annual visitors. Explore leasing, sponsorship, and event opportunities." />
    <meta property="og:image" content="/images/og-share.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Mall of America" />

    <!-- ─── Twitter Card ─── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mall of America — Partner With America's Destination" />
    <meta name="twitter:description" content="40M+ annual visitors. Open a store, sponsor an experience, or host an event." />
    <meta name="twitter:image" content="/images/og-share.jpg" />

    <!-- ─── Favicon ─── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ─── Google Fonts — Preconnect ─── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ─── Google Fonts — Load ─── -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,700&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,700&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- ─── Theme Color ─── -->
    <meta name="theme-color" content="#0A0A0A" />
    <meta name="color-scheme" content="dark" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
